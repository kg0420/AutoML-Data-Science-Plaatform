
{% extends "base.html"%}
{% block title %}Make Prediction{% endblock %}
{% block content%}

<body class="bg-[#020617] text-white p-10 overflow-x-hidden">

<!-- 🌌 BACKGROUND GLOW -->
<div class="fixed w-[400px] h-[400px] bg-green-400 opacity-20 blur-3xl rounded-full top-[-100px] left-[-100px] animate-pulse"></div>
<div class="fixed w-[400px] h-[400px] bg-purple-500 opacity-20 blur-3xl rounded-full bottom-[-100px] right-[-100px] animate-pulse"></div>

<!-- HEADER -->
<h1 class="text-4xl font-bold mb-8 bg-gradient-to-r from-green-400 to-purple-500 text-transparent bg-clip-text text-center">
    🔮 Make Prediction
</h1>

<!-- RESULT -->
{% if show_prediction %}
<div class="mb-8 text-center card">
    <h2 class="text-2xl font-bold text-green-400">
        Prediction: {{ prediction }}
    </h2>
</div>
{% endif %}

<!-- FORM -->
<form action="/predict_result" method="post" class="grid md:grid-cols-2 gap-6">

    {% for feature in features %}
    <div class="card">

        <label class="block text-sm font-semibold mb-2 text-gray-300">
            {{feature}}
        </label>

        <input type="number" step="any" name="{{feature}}" placeholder="Enter {{feature}}"
            class="input focus:ring-2 focus:ring-green-400" />

    </div>
    {% endfor %}

    <!-- BUTTON -->
    <div class="md:col-span-2">
        <button class="btn-green">
            Predict
        </button>
    </div>

</form>

<!-- 🎨 STYLES -->
<style>
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 16px;
    border-radius: 16px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 0 20px rgba(0,255,150,0.2);
}

.input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
}

button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    background: #16a34a;
    transition: 0.3s;
    font-weight: 600;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(0,255,150,0.3);
}
</style>

</body>
</html>
